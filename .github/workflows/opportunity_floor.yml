- name: Commit and push output files
        run: |
          git config user.name "Opportunity Floor Bot"
          git config user.email "bot@defensesignals.com"
          git add output/opportunity_floor.json \
                  output/daily_email.html \
                  output/daily_email.txt \
                  output/linkedin_post.txt \
                  output/daily_article.md \
                  state.json
          git diff --cached --quiet || git commit -m "Opportunity Floor | $(date +'%m/%d/%y')"
          git push origin HEAD:main --force
